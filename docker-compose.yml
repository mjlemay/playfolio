version: '3.8'

services:
  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: playfolio-db
    environment:
      POSTGRES_DB: playfolio
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the playfolio_test database on first boot
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d playfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Run Drizzle migrations before the app starts ────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playfolio-migrate
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@postgres:5432/playfolio
    depends_on:
      postgres:
        condition: service_healthy
    # npx drizzle-kit migrate applies all pending migrations then exits
    command: npx drizzle-kit migrate
    # Don't restart — it's a one-shot task
    restart: "no"

  # ─── Playfolio API ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playfolio-app
    ports:
      - "3777:3777"
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@postgres:5432/playfolio
      TEST_DATABASE_URL: postgresql://appuser:apppassword@postgres:5432/playfolio_test
      PLAYFOLIO_ADMIN_KEY: your-secure-admin-key-here
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3777

  # ─── Playfolio Admin (optional — start with: docker compose --profile admin up) ──
  admin:
    profiles:
      - admin
    build:
      context: ../playfolio-admin
      dockerfile: Dockerfile
    container_name: playfolio-admin
    ports:
      - "4400:4400"
    environment:
      NODE_ENV: development
      # Reaches the API container by service name on the Docker network
      NEXT_PUBLIC_API_URL: http://app:3777
    depends_on:
      - app
    volumes:
      - ../playfolio-admin:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
